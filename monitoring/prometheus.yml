global:
  scrape_interval: 5s

scrape_configs:

  - job_name: backend
    static_configs:
      - targets: ["backend:5000"]

  - job_name: node_exporter
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
